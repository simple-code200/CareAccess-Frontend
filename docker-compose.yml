services:
  backend:
    build:
      context: ./backend
    image: pradyumnajkumar/lib-backend:latest
    container_name: care-access-backend
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    image: pradyumnajkumar/lib-frontend:latest
    container_name: care-access-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
